name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install root dependencies
        run: npm ci

      - name: Install webview dependencies
        run: cd webview && npm ci

      - name: Lint extension
        run: npx eslint src/

      - name: Lint webview
        run: cd webview && npx eslint src/

      - name: Type-check extension
        run: npx tsc --noEmit

      - name: Type-check webview
        run: cd webview && npx tsc

      - name: Test root
        run: npm test

      - name: Test webview
        run: cd webview && npm test

      - name: Build
        run: npm run build
